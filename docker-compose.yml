services:
  db:
    image: postgres:16-alpine
    container_name: promapparat_db
    environment:
      POSTGRES_DB: promapparat
      POSTGRES_USER: promapparat
      POSTGRES_PASSWORD: promapparat_local_password
    ports:
      - "5432:5432"
    volumes:
      - promapparat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promapparat -d promapparat"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: promapparat_backend
    environment:
      NODE_ENV: development
      PORT: 8787
      DATABASE_URL: postgres://promapparat:promapparat_local_password@db:5432/promapparat
      DATABASE_SSL: "false"
      JWT_SECRET: local-development-secret-change-before-production-2026
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      FILE_STORAGE_DIR: /app/storage
      SEED_DIRECTOR_EMAIL: director@promapparat.local
      SEED_DIRECTOR_PASSWORD: ChangeMe-Director-2026
      SEED_MANAGER_EMAIL: manager@promapparat.local
      SEED_MANAGER_PASSWORD: ChangeMe-Manager-2026
    ports:
      - "8787:8787"
    volumes:
      - promapparat_files:/app/storage
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: promapparat_frontend
    environment:
      VITE_API_URL: http://localhost:8787
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/package.json:/app/package.json
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - backend

volumes:
  promapparat_pgdata:
  promapparat_files:
